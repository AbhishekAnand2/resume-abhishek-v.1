<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Abhishek Anand</title>
    <!-- Use same google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link to the perfectly styled CSS bundle -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Inline page-specific aesthetics -->
    <style>
        body {
            /* Force exact background gradient centering for the 404 container */
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .error-card {
            max-width: 500px;
            width: 100%;
            text-align: center;
            /* Utilize global experience-card glassmorphism class! */
        }

        .error-code {
            font-size: 7rem;
            font-weight: 700;
            color: var(--accent-cyan);
            line-height: 0.9;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 25px rgba(0, 210, 157, 0.4);
            font-family: monospace;
        }

        .game-canvas {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            margin: 1.5rem auto;
            display: block;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            max-width: 100%;
            /* Responsive shrinking */
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        .controls-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-home {
            display: inline-block;
            background-color: var(--accent-cyan);
            color: #ffffff; /* Explicitly white for button contrast */
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 157, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 157, 0.5);
            color: #ffffff;
        }

        .score-display {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--text-main);
            margin: 1rem auto 0.5rem;
            max-width: 400px;
            padding: 0 0.5rem;
        }
        
        .score-display .highlight {
            color: var(--accent-cyan);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="experience-card error-card">
        <div class="error-code">404</div>
        <h2 style="color: var(--text-white); margin-bottom: 0.8rem;">Page Not Found</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1rem;">Looks like you wandered off the map. While you're here, try to beat the high score, or head back to the portfolio.</p>
        
        <div class="score-display">
            <span>SCORE: <span id="score" class="highlight">0</span></span>
            <span>HIGH SCORE: <span id="highscore" class="highlight">0</span></span>
        </div>
        
        <!-- The Game Viewport -->
        <canvas id="gameCanvas" width="400" height="400" class="game-canvas"></canvas>
        
        <div class="controls-hint">
            <i class="fa-solid fa-gamepad"></i> Use Arrow Keys / WASD to play
        </div>
        
        <a href="index.html" class="btn-home"><i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Return Location</a>
    </div>

    <!-- Inject Isolated Game Engine -->
    <script src="js/game.js"></script>

</body>
</html>
